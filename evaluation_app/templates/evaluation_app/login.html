{% extends 'evaluation_app/base.html' %}
{% load socialaccount %}

{% block content %}
<div style="max-width: 400px; margin: 0 auto; text-align: center;">
    <h2>Evaluator Login</h2>
    <p>Sign in with your authorized Google account.</p>

    <a href="{% provider_login_url 'google' process='login' %}" class="btn" style="width: 100%; box-sizing: border-box; margin-bottom: 24px;">
        Continue with Google
    </a>

    <div style="border-top: 1px solid #ddd; margin: 10px 0 24px; padding-top: 20px;">
        <p style="font-size: 0.9rem; color: #666;">Or use a local evaluator access code.</p>
    </div>

    <form method="post">
        {% csrf_token %}
        {% if request.GET.next %}
        <input type="hidden" name="next" value="{{ request.GET.next }}">
        {% endif %}
        <div class="form-group">
            <input type="text" name="access_code" placeholder="Enter Access Code" required autofocus
                style="text-align: center; font-size: 1.2rem; letter-spacing: 2px;">
        </div>
        <button type="submit" class="btn">Start Evaluation</button>
    </form>
</div>
{% endblock %}
